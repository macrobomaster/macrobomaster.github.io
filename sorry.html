<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/png" href="assets/img/favicon.ico">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <title>MAC RoboMaster — Applications Closed</title>
    <meta content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0' name='viewport' />
    <link href='https://fonts.googleapis.com/css?family=Montserrat:400,300,700' rel='stylesheet' type='text/css'>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #1a1a1a;
            background-image: url('assets/img/background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.62);
            z-index: 0;
        }

        .card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            padding: 56px 48px 48px;
            max-width: 520px;
            width: 90%;
            animation: fadeInUp 0.7s ease both;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .icon {
            font-size: 48px;
            margin-bottom: 20px;
        }

        h1 {
            color: #ffffff;
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }

        p {
            color: rgba(255, 255, 255, 0.72);
            font-size: 1rem;
            font-weight: 300;
            line-height: 1.7;
            margin-bottom: 36px;
        }

        .btn-back {
            display: inline-block;
            background-color: #e84545;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-decoration: none;
            padding: 13px 36px;
            border-radius: 30px;
            transition: background 0.2s ease, transform 0.15s ease;
        }

        .btn-back:hover {
            background-color: #c73535;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="icon">🤖</div>
        <h1>Applications Closed</h1>
        <p>Sorry! We will take in new applicants next September when the new season starts. Check back then — we'd love to have you on the team!</p>
        <a href="index.html" class="btn-back">Back to Home</a>
    </div>
</body>

</html>
